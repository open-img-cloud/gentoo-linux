name: Build & publish image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (otherwise derived from tag, falling back to VERSION file)'
        required: false
      publish:
        description: 'If false, skip upload + CF purge (PR / dry-run validation)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write   # cosign keyless via GitHub OIDC

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.version }}" ]]; then
            v="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          elif [[ -f VERSION ]]; then
            v=$(tr -d '[:space:]' < VERSION)
          else
            echo "::error::no version provided and no VERSION file found"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$v"

  build:
    needs: resolve-version
    name: Build
    uses: open-img-cloud/.github/.github/workflows/build-dib-image.yml@main
    with:
      os_name: gentoo-linux
      version: ${{ needs.resolve-version.outputs.version }}
      output_filename: 'gentoo-{version}-x86_64.qcow2'
      build_script: build/dib-build.sh
      # Same as octavia: GH-hosted runner + ubuntu:24.04 container.
      # See build-dib-image.yml comment in octavia-amphora release.yml
      # for the rootless-Podman caps rationale.
      runner_labels: '["ubuntu-latest"]'
      build_container: 'ubuntu:24.04'
      verify_builder: false
      publish: ${{ inputs.publish == true || github.event_name == 'push' }}
      sync_latest: true
    secrets: inherit
